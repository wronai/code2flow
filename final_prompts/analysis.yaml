    not result[\''success\'']:\n                errors.append(f"Step {i} failed: {result.get(\''error\'',
    \''Unknown error\'')}")\n                if not step.get(\''continue_on_error\'',
    False):\n                    break\n        \n        return {\n            \''success\'':
    len(errors) == 0,\n            \''results\'': results,\n            \''errors\'':
    errors,\n            \''steps_executed\'': len(results)\n        }\n    \n    def
    get_execution_stats(self) -> Dict[str, Any]:\n        """Get execution statistics."""\n        stats
    = {}\n        for action_type, executor in self.executors.items():\n            stats[action_type.value]
    = executor.execution_count\n        \n        return {\n            \''total_executions\'':
    sum(stats.values()),\n            \''by_type\'': stats,\n            \''success_rate\'':
    self._calculate_success_rate()\n        }\n    \n    def _get_timestamp(self)
    -> str:\n        """Get current timestamp."""\n        from datetime import datetime\n        return
    datetime.now().isoformat()\n    \n    def _calculate_success_rate(self) -> float:\n        """Calculate
    success rate."""\n        if not self.execution_history:\n            return 1.0\n        \n        successful
    = sum(1 for entry in self.execution_history if entry[\''result\''][\''success\''])\n        return
    successful / len(self.execution_history)\n\n\n# Backward compatibility functions\ndef
    execute_plan_step(step: Dict[str, Any], context: ExecutionContext) -> Dict[str,
    Any]:\n    """Execute single plan step (backward compatibility)."""\n    executor
