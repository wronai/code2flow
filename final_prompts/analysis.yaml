    run_dom_multi_action(actions: List[Dict[str, Any]], context: ExecutionContext)
    -> Dict[str, Any]:\n    """Run multiple DOM actions (refactored)."""\n    executor
    = RefactoredPlanExecutor()\n    \n    # Convert to plan format\n    plan = [{\''type\'':
    \''dom_action\'', **action} for action in actions]\n    return executor.execute_plan(plan,
    context)\n\n\n# Global instance\nplan_executor = RefactoredPlanExecutor()\n'''
