    Dict[str, Callable], name: str = None) -> AggregateProcessor:\n    """Create aggregate
    processor."""\n    return AggregateProcessor(aggregators, name or "aggregate")\n\n\ndef
    pipeline(name: str = "pipeline") -> ProcessingPipeline:\n    """Create new processing
